# Fly.io app config — `fly launch` will detect the Dockerfile and mostly just
# ask for an app name/region; keep this file as-is when it offers to
# regenerate one.

app = "kdx-explorer"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

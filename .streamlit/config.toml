# Allow large browser uploads (MB). For hundreds-of-MB files prefer the
# "Path on this machine" input on the Upload page, which bypasses the browser.
[server]
maxUploadSize = 2000
maxMessageSize = 2000

# No `base` lock: Streamlit follows the user's system / Settings-menu choice,
# so both light and dark themes work and are user-toggleable. primaryColor is
# theme-neutral and keeps the brand accent consistent across both.
[theme]
primaryColor = "#3182bd"
